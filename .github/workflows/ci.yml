# CI: build + test the SDK module and every example connector on push / PR.
# The SDK is a standalone module (stdlib only); each example is its own module that
# resolves the SDK via a local `replace => ../..`, so each builds independently.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - examples/files-client
          - examples/mysql-client
          - examples/postgres-client
          - examples/wordpress-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: build / vet / test
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go vet ./...
          go test -count=1 ./...
