# Release: on a `v*` tag, GoReleaser builds the addon connector binaries (→ archives
# + GitHub release) and multi-arch (amd64+arm64) Docker images for all four addons
# → Docker Hub. Images COPY the binfinity CLI from diyrex5224/binfinity-cli, so make
# sure the monorepo's CLI release ran first.
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (GITHUB_TOKEN is auto).
# Cut a release:  git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
